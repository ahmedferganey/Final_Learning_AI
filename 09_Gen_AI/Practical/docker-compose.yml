version: "3.9"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: llm_platform
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  gateway_api:
    build:
      context: .
      dockerfile: infra/docker/gateway.Dockerfile
    env_file:
      - .env.example
    ports:
      - "8000:8000"
    depends_on:
      - redis
      - postgres

  chat_service:
    build:
      context: .
      dockerfile: infra/docker/chat.Dockerfile
    env_file:
      - .env.example
    ports:
      - "8001:8001"
    depends_on:
      - redis

  rag_service:
    build:
      context: .
      dockerfile: infra/docker/rag.Dockerfile
    env_file:
      - .env.example
    ports:
      - "8002:8002"
    depends_on:
      - redis

  agent_service:
    build:
      context: .
      dockerfile: infra/docker/agent.Dockerfile
    env_file:
      - .env.example
    ports:
      - "8003:8003"
    depends_on:
      - redis

  eval_service:
    build:
      context: .
      dockerfile: infra/docker/eval.Dockerfile
    env_file:
      - .env.example
    ports:
      - "8004:8004"
    depends_on:
      - redis
