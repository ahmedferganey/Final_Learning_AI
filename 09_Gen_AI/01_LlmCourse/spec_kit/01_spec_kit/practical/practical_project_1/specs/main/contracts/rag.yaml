openapi: 3.1.0
info:
  title: RAG Service API
  version: 1.0.0
  summary: Production-grade retrieval-augmented generation API for FastAPI services.
  description: >
    This specification defines an authenticated RAG query endpoint with request validation,
    collection-scoped authorization, source citations, and structured upstream failure handling.
servers:
  - url: https://api.example.com
    description: Production
  - url: https://staging-api.example.com
    description: Staging
tags:
  - name: RAG
security:
  - bearerAuth: []
paths:
  /v1/rag/query:
    post:
      tags: [RAG]
      summary: Execute a retrieval-augmented generation query
      description: >
        Validates the request, enforces collection access controls, performs retrieval,
        calls the configured generation provider, and returns an answer with citations.
      operationId: executeRagQuery
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RagQueryRequest'
      responses:
        '200':
          description: Answer with citations and execution metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RagQueryResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Caller cannot access one or more requested collections
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          $ref: '#/components/responses/ValidationError'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '502':
          $ref: '#/components/responses/UpstreamFailure'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Access token containing the caller identity and collection access claims.

  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Authentication failed or token is invalid
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    TooManyRequests:
      description: Rate limit exceeded
      headers:
        Retry-After:
          description: Seconds until another request is allowed
          schema:
            type: integer
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ValidationError:
      description: Payload validation failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ValidationErrorResponse'
    UpstreamFailure:
      description: Retrieval or generation provider failed after request acceptance
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    RagQueryRequest:
      type: object
      additionalProperties: false
      required:
        - query
        - collection_ids
      properties:
        query:
          type: string
          minLength: 3
          maxLength: 2000
          description: Natural-language prompt submitted by the caller.
        collection_ids:
          type: array
          minItems: 1
          maxItems: 10
          uniqueItems: true
          items:
            type: string
            format: uuid
        top_k:
          type: integer
          minimum: 1
          maximum: 20
          default: 5
        include_citations:
          type: boolean
          default: true
        conversation_context:
          type: array
          maxItems: 20
          items:
            type: string
            minLength: 1
            maxLength: 4000
          description: Optional recent conversation turns used for context compression or reformulation.
    RagQueryResponse:
      type: object
      additionalProperties: false
      required:
        - answer
        - citations
        - model_name
        - retrieved_chunk_count
        - latency_ms
      properties:
        answer:
          type: string
          minLength: 1
        citations:
          type: array
          items:
            $ref: '#/components/schemas/Citation'
        model_name:
          type: string
        retrieved_chunk_count:
          type: integer
          minimum: 0
        latency_ms:
          type: integer
          minimum: 0
    Citation:
      type: object
      additionalProperties: false
      required:
        - chunk_id
        - source_title
        - source_uri
        - snippet
        - score
      properties:
        chunk_id:
          type: string
          format: uuid
        source_title:
          type: string
          minLength: 1
          maxLength: 255
        source_uri:
          type: string
          format: uri
          maxLength: 2048
        snippet:
          type: string
          minLength: 1
          maxLength: 4000
        score:
          type: number
          minimum: 0
          maximum: 1
    ErrorResponse:
      type: object
      additionalProperties: false
      required:
        - error
        - message
      properties:
        error:
          type: string
        message:
          type: string
        request_id:
          type: string
    ValidationErrorItem:
      type: object
      additionalProperties: false
      required:
        - field
        - message
      properties:
        field:
          type: string
        message:
          type: string
    ValidationErrorResponse:
      allOf:
        - $ref: '#/components/schemas/ErrorResponse'
        - type: object
          required:
            - details
          properties:
            details:
              type: array
              minItems: 1
              items:
                $ref: '#/components/schemas/ValidationErrorItem'
