openapi: 3.1.0
info:
  title: User Service API
  version: 1.0.0
  summary: User profile and role administration API for FastAPI services.
paths:
  /v1/users/me:
    get:
      summary: Get the authenticated user profile
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current user profile
    patch:
      summary: Update the authenticated user profile
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Updated user profile
  /v1/users/{user_id}/roles:
    put:
      summary: Replace role assignments for a user
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Roles updated
        '403':
          description: Caller lacks the admin role
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
