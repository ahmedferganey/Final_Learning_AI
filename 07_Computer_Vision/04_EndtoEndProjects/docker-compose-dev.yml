version: "3.9"

services:
  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS}
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

  postgres:
    image: postgres:14
    container_name: postgres_db
    env_file:
      - .env
    volumes:
      - postgres-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $POSTGRES_USER"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

  backend_service:
    build:
      context: ./services/backend_service
      dockerfile: backend-service.Dockerfile
    container_name: backend_service
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - ./services/backend_service/app:/usr/src/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - backend

  frame_reader:
    build:
      context: ./services/frame_reader
      dockerfile: frame-reader.Dockerfile
    container_name: frame_reader
    depends_on:
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./shared/data:/shared/data
    env_file:
      - .env
    networks:
      - backend

  detection_service:
    build:
      context: ./services/detection_service
      dockerfile: detection-service.Dockerfile
    container_name: detection_service
    env_file:
      - .env
    networks:
      - backend

  ui_frontend:
    build:
      context: ./services/ui_frontend
      dockerfile: ui-frontend.Dockerfile
    container_name: ui_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend_service
    env_file:
      - .env
    environment:
      VITE_BACKEND_API_URL: "http://localhost:8000/api"
      VITE_WEBSOCKET_URL: "ws://localhost:8000/ws/frames"
      VITE_FIREBASE_API_KEY: ${VITE_FIREBASE_API_KEY}
      VITE_FIREBASE_AUTH_DOMAIN: ${VITE_FIREBASE_AUTH_DOMAIN}
      VITE_FIREBASE_PROJECT_ID: ${VITE_FIREBASE_PROJECT_ID}
      VITE_FIREBASE_MESSAGING_SENDER_ID: ${VITE_FIREBASE_MESSAGING_SENDER_ID}
      VITE_FIREBASE_APP_ID: ${VITE_FIREBASE_APP_ID}
      VITE_FIREBASE_STORAGE_BUCKET: ${VITE_FIREBASE_STORAGE_BUCKET}
      VITE_FIREBASE_MEASUREMENT_ID: ${VITE_FIREBASE_MEASUREMENT_ID}
    networks:
      - backend

  nginx:
    build:
      context: ./services/nginx
      dockerfile: nginx.Dockerfile
    container_name: nginx
    ports:
      - "80:80"
    depends_on:
      - backend_service
      - ui_frontend
    volumes:
      - ./services/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - backend

volumes:
  postgres-db:

networks:
  backend:
    driver: bridge
