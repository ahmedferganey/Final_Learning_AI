worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile        on;

    # Upstream for backend (FastAPI)
    upstream backend_service {
        server backend_gateway:8000;
    }

    # Future: React Dashboard
    # upstream dashboard_service {
    #     server dashboard:3000;
    # }

    # Future: Flutter Web App
    # upstream frontend_service {
    #     server frontend:5000;
    # }

    # Future: Firebase Auth Microservice
    # upstream auth_service {
    #     server auth_service:8001;
    # }

    # Future: Computer Vision Service
    # upstream cv_service {
    #     server computer_vision:8002;
    # }

    server {
        listen 80;

        # Route to Backend API
        location /api/ {
            proxy_pass http://backend_service/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Future: Flutter frontend (web)
        # location / {
        #     proxy_pass http://frontend_service;
        #     proxy_set_header Host $host;
        #     proxy_set_header X-Real-IP $remote_addr;
        # }

        # Future: React Admin Dashboard
        # location /dashboard/ {
        #     proxy_pass http://dashboard_service/;
        #     proxy_set_header Host $host;
        #     proxy_set_header X-Real-IP $remote_addr;
        # }

        # Future: Auth microservice
        # location /auth/ {
        #     proxy_pass http://auth_service/;
        #     proxy_set_header Host $host;
        #     proxy_set_header X-Real-IP $remote_addr;
        # }

        # Future: Computer Vision service
        # location /cv/ {
        #     proxy_pass http://cv_service/;
        #     proxy_set_header Host $host;
        #     proxy_set_header X-Real-IP $remote_addr;
        # }
    }
}

