
services:
  nginx:
    image: nginx:latest
    container_name: nginx_gateway
    restart: unless-stopped
    ports:
      - "8888:80"
    volumes:
      - ../gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend_gateway
      - db
      # - frontend
      # - auth_service
      # - computer_vision
    networks:
      - app-network
  db:
    image: postgres:13
    container_name: postgres_db
    restart: always
    env_file:
      - ../backend_gateway/.env.dev
    environment:
      POSTGRES_DB: myapp_db
      POSTGRES_USER: ferganey
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    #   - ./override-entrypoint.sh:/docker-entrypoint-initdb.d/override-entrypoint.sh
    # entrypoint: ["/docker-entrypoint-initdb.d/override-entrypoint.sh"]      
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ferganey -d myapp_db"]
      interval: 5s
      timeout: 5s
      retries: 5  
    networks:
      - app-network

  backend_gateway:
    build:
      context: ../backend_gateway
      dockerfile: backend.Dockerfile
    container_name: backend_gateway
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    env_file:
      - ../backend_gateway/.env.dev
    # environment:
    #   # ENV: ${ENV}
    #   # # RUNNING_IN_DOCKER: ${RUNNING_IN_DOCKER}
    #   # # POSTGRES_USER: ${POSTGRES_USER}
    #   # # POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    #   # # POSTGRES_DB: ${POSTGRES_DB}
    #   # # POSTGRES_HOST: ${POSTGRES_HOST}
    #   # # POSTGRES_PORT: ${POSTGRES_PORT}    
    volumes:
      - ../backend_gateway:/app
      - ../shared_libs:/app/shared_libs
      - ../firebase:/app/firebase:ro
    depends_on:
      db:
        condition: service_healthy

    ports:
      - "8000:8000"
    networks:
      - app-network

volumes:
  postgres_data:

networks:
  app-network:
    driver: bridge




