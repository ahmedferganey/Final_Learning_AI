version: "3.9"

services:
  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS}
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

  postgres:
    image: postgres:14
    container_name: postgres_db
    env_file:
      - .env
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $POSTGRES_USER"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

  backend_service:
    image: backend_service_prod
    container_name: backend_service
    build:
      context: ./services/backend_service
      dockerfile: backend-service.Dockerfile
    env_file:
      - .env
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - ./services/backend_service/app:/usr/src/app:ro
    command: uvicorn app.main:app --host ${BACKEND_HOST} --port ${BACKEND_PORT}
    networks:
      - backend

  frame_reader:
    image: frame_reader_prod
    container_name: frame_reader
    build:
      context: ./services/frame_reader
      dockerfile: frame-reader.Dockerfile
    depends_on:
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./shared/data:/shared/data
    env_file: .env
    networks:
      - backend

  detection_service:
    image: detection_service_prod
    container_name: detection_service
    build:
      context: ./services/detection_service
      dockerfile: detection-service.Dockerfile
    env_file:
      - .env
    networks:
      - backend

  ui_frontend:
    image: ui_frontend_prod
    container_name: ui_frontend
    build:
      context: ./services/ui_frontend
      dockerfile: ui-frontend.Dockerfile
    env_file:
      - .env
    ports:
      - "3000:80"
    depends_on:
      - backend_service
    networks:
      - backend

  nginx:
    build:
      context: ./services/nginx
      dockerfile: nginx.Dockerfile
    container_name: nginx
    ports:
      - "80:80"
    depends_on:
      - backend_service
      - frame_reader
      - detection_service
      - ui_frontend
    volumes:
      - ./services/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - backend

volumes:
  postgres-data:

networks:
  backend:
    driver: bridge
